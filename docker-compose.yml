services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restapi_app
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=restapi_db;Username=restapi_user;Password=restapi_pass
      - ConnectionStrings__Redis=redis:6379
    volumes:
      - uploads:/app/wwwroot/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - restapi_network

  db:
    image: postgres:16-alpine
    container_name: restapi_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: restapi_db
      POSTGRES_USER: restapi_user
      POSTGRES_PASSWORD: restapi_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restapi_user -d restapi_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restapi_network

  redis:
    image: redis:7-alpine
    container_name: restapi_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restapi_network

  nginx:
    image: nginx:alpine
    container_name: restapi_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - restapi_network

  certbot:
    image: certbot/certbot:latest
    container_name: restapi_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"

volumes:
  pgdata:
  redisdata:
  uploads:
  certbot_www:
  certbot_certs:

networks:
  restapi_network:
    driver: bridge
